<div class="app-layout">
  <app-kanban-sidebar
    [orders]="orders()"
    [selectedOrder]="selectedOrder()"
    (orderSelected)="onOrderSelected($event)"
    (newOrderClicked)="onNewOrder()"
    (deleteOrderClicked)="onDeleteOrder($event)"
  />

  <main class="main-content">
    @if (currentView() === 'pedidos') {
      <app-order-form
        [selectedOrder]="selectedOrder()"
        (saveOrder)="onSaveOrder($event)"
        (deleteOrder)="onDeleteOrder($event)"
        (adicionarCoifa)="onNavigateToCoifa()"
      />
    }
    @if (currentView() === 'coifa') {
      <app-coifa-form
        (voltar)="onVoltarParaPedidos()"
      />
    }
  </main>
</div>
