<div class="app-layout">
  <app-kanban-sidebar
    [orders]="orders()"
    [selectedOrder]="selectedOrder()"
    (orderSelected)="onOrderSelected($event)"
    (newOrderClicked)="onNewOrder()"
  />

  <main class="main-content">
    <app-order-form
      [selectedOrder]="selectedOrder()"
      (saveOrder)="onSaveOrder($event)"
      (deleteOrder)="onDeleteOrder($event)"
    />
  </main>
</div>
