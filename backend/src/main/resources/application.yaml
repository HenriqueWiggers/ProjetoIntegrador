spring:
  application:
    name: projeto-integrador

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/projeto_integrador?useTimezone=true&serverTimezone=UTC
    username: user
    password: 12345678
    hikari:
      initializationFailTimeout: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    br.com.henrique: DEBUG